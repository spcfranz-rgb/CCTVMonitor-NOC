<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Edit Camera - CCTV Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5" style="max-width: 800px;">
    
    <div class="card border-secondary shadow">
        <div class="card-header bg-dark border-secondary">
            <h4 class="mb-0">Edit Camera</h4>
        </div>
        <div class="card-body bg-body-tertiary">
            <form action="/edit_camera/{{ camera.id }}" method="POST">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Camera Name (Must be unique)</label>
                        <input type="text" name="name" class="form-control border-secondary" value="{{ camera.name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Parent Switch (Dependency)</label>
                        <select name="switch_id" class="form-select border-secondary">
                            <option value="">None (Standalone)</option>
                            {% for s in switches %}
                                <option value="{{ s.id }}" {% if camera.switch_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">IP Address</label>
                        <input type="text" name="ip" class="form-control border-secondary" value="{{ camera.ip }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Manufacturer</label>
                        <select name="manufacturer" class="form-select border-secondary" required>
                            <option value="Other" {% if camera.manufacturer == 'Other' %}selected{% endif %}>Other (FFmpeg RTSP)</option>
                            <option value="Hanwha" {% if camera.manufacturer == 'Hanwha' %}selected{% endif %}>Hanwha / Wisenet</option>
                            <option value="Hikvision" {% if camera.manufacturer == 'Hikvision' %}selected{% endif %}>Hikvision</option>
                            <option value="Dahua" {% if camera.manufacturer == 'Dahua' %}selected{% endif %}>Dahua</option>
                            <option value="Amcrest" {% if camera.manufacturer == 'Amcrest' %}selected{% endif %}>Amcrest</option>
                            <option value="Axis" {% if camera.manufacturer == 'Axis' %}selected{% endif %}>Axis</option>
                            <option value="Foscam" {% if camera.manufacturer == 'Foscam' %}selected{% endif %}>Foscam</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small">RTSP Stream URL</label>
                    <input type="text" name="stream_url" class="form-control border-secondary" value="{{ camera.stream_url }}" required>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Camera Username</label>
                        <input type="text" name="username" class="form-control border-secondary" value="{{ camera.username }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted small">Camera Password</label>
                        <input type="password" name="password" class="form-control border-secondary" value="{{ camera.password }}">
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-warning">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
