<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Edit Switch - CCTV Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5" style="max-width: 600px;">
    
    <div class="card border-secondary shadow">
        <div class="card-header bg-dark border-secondary">
            <h4 class="mb-0">Edit Switch</h4>
        </div>
        <div class="card-body bg-body-tertiary">
            <form action="/edit_switch/{{ switch.id }}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small">Switch Name (Must be unique)</label>
                    <input type="text" name="name" class="form-control border-secondary" value="{{ switch.name }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">IP Address or Hostname</label>
                    <input type="text" name="ip" class="form-control border-secondary" value="{{ switch.ip }}" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-warning">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
