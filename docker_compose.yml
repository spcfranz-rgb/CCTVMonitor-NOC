version: '3.8'

services:
  cctv-manager:
    build: .
    container_name: cctv-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Mounts a local 'data' folder to store the SQLite DB persistently
      - ./data:/app/data
    environment:
      - TZ=America/New_York # Update to your local timezone
