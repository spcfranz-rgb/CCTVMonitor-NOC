<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>CCTV Monitor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h1 class="mb-0 h3">CCTV & Network Dashboard</h1>
        <div class="d-flex align-items-center">
            <span class="me-3">Logged in as: <strong>{{ current_user.username }}</strong> ({{ current_user.role }})</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            
            <div class="card mb-4">
                <div class="card-header"><h5 class="mb-0">Network Switches</h5></div>
                <div class="card-body">
                    <table class="table table-sm align-middle">
                        <thead><tr><th>Name</th><th>IP</th><th>Status</th>{% if current_user.role == 'admin' %}<th></th>{% endif %}</tr></thead>
                        <tbody>
                            {% for s in switches %}
                            <tr>
                                <td>{{ s.name }}</td>
                                <td>
                                    {{ s.ip }}
                                    <a href="/tunnel/switch/{{ s.id }}/" target="_blank" class="badge bg-info text-decoration-none ms-2">WebUI</a>
                                </td>
                                <td>
                                    <span class="badge {% if s.status == 'UP' %}bg-success{% elif s.status == 'DOWN' %}bg-danger{% else %}bg-secondary{% endif %}">
                                        {{ s.status }}
                                    </span>
                                </td>
